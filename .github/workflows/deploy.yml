name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  PROJECT_ID: pcsbot-490004
  SERVICE_NAME: ro-tools
  REGION: us-central1
  DATA_BUCKET: pcsbot-490004-ro-tools-data

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker --quiet

      - name: Build Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
                       -t gcr.io/$PROJECT_ID/$SERVICE_NAME:latest .

      - name: Push Docker image
        run: docker push --all-tags gcr.io/$PROJECT_ID/$SERVICE_NAME

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image=gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA \
            --region=$REGION \
            --platform=managed \
            --allow-unauthenticated \
            --port=3000 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=300 \
            --min-instances=0 \
            --max-instances=3 \
            --execution-environment=gen2 \
            --add-volume=name=data-vol,type=cloud-storage,bucket=$DATA_BUCKET \
            --add-volume-mount=volume=data-vol,mount-path=/data \
            --set-env-vars=DATA_DIR=/data \
            --update-secrets=GOOGLE_CLIENT_ID=ro-tools-client-id:latest,GOOGLE_CLIENT_SECRET=ro-tools-client-secret:latest,GOOGLE_REDIRECT_URI=ro-tools-redirect-uri:latest,GOOGLE_SERVICE_ACCOUNT=ro-tools-service-account:latest
